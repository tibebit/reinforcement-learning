<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Briscola RL</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Briscola RL</h1>
          <p id="statusText">Loading...</p>
        </div>
        <div class="score-strip" aria-label="Score">
          <div>
            <span>Team A</span>
            <strong id="scoreA">0</strong>
          </div>
          <div>
            <span>Team B</span>
            <strong id="scoreB">0</strong>
          </div>
          <div>
            <span>Trick</span>
            <strong id="trickIndex">0/10</strong>
          </div>
        </div>
      </header>

      <section class="controls">
        <label>
          P2 Opponent
          <select id="p2Policy">
            <option value="greedy">Greedy</option>
            <option value="learner">Learner checkpoint</option>
            <option value="heuristic">Heuristic</option>
            <option value="random">Random</option>
          </select>
        </label>
        <label>
          P3 Partner
          <select id="partnerPolicy">
            <option value="learner">Learner checkpoint</option>
            <option value="heuristic">Heuristic</option>
            <option value="greedy">Greedy</option>
            <option value="random">Random</option>
          </select>
        </label>
        <label>
          P4 Opponent
          <select id="p4Policy">
            <option value="greedy">Greedy</option>
            <option value="learner">Learner checkpoint</option>
            <option value="heuristic">Heuristic</option>
            <option value="random">Random</option>
          </select>
        </label>
        <label class="checkpoint-label">
          Learner checkpoint
          <input id="checkpointInput" type="text" value="experiments/results/checkpoint.json" />
        </label>
        <label>
          Bot mode
          <select id="botMode">
            <option value="stochastic">Stochastic</option>
            <option value="greedy">Greedy</option>
          </select>
        </label>
        <label class="checkbox-label">
          <span>Learn after game</span>
          <input id="learnAfterGame" type="checkbox" checked />
        </label>
        <label>
          Web LR
          <input id="learningRateInput" type="number" min="0.0001" step="0.0005" value="0.005" />
        </label>
        <label>
          Seed
          <input id="seedInput" type="number" placeholder="random" />
        </label>
        <button id="newGameButton" type="button">New Game</button>
      </section>

      <section class="table" aria-label="Game table">
        <div class="seat seat-top" id="seat2">
          <span>P3</span>
          <strong>Partner</strong>
          <small></small>
        </div>
        <div class="seat seat-left" id="seat1">
          <span>P2</span>
          <strong>Opponent</strong>
          <small></small>
        </div>
        <div class="seat seat-right" id="seat3">
          <span>P4</span>
          <strong>Opponent</strong>
          <small></small>
        </div>
        <div class="seat seat-bottom active-human" id="seat0">
          <span>P1</span>
          <strong>You</strong>
          <small>human</small>
        </div>

        <div class="center-stack">
          <div class="turn-banner" id="turnBanner">Your turn</div>
          <div class="trump-area">
            <div>
              <span>Trump</span>
              <strong id="trumpSuit">-</strong>
            </div>
            <div id="revealedTrump" class="mini-card empty-card">Hidden</div>
            <div>
              <span>Deck</span>
              <strong id="deckCount">0</strong>
            </div>
          </div>
          <div id="trickArea" class="trick-area"></div>
        </div>
      </section>

      <section class="hand-section">
        <div class="section-heading">
          <h2>Your Hand</h2>
          <span id="turnHint"></span>
        </div>
        <div id="handArea" class="hand-area"></div>
      </section>

      <section class="partner-section">
        <div class="section-heading">
          <h2>Partner Hand</h2>
          <span id="partnerHint"></span>
        </div>
        <div id="partnerHandArea" class="hand-area compact-hand"></div>
      </section>

      <section class="lower-grid">
        <div>
          <h2>Last Trick</h2>
          <div id="lastTrickArea" class="history-cards"></div>
        </div>
        <div>
          <h2>Log</h2>
          <ol id="eventLog" class="event-log"></ol>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
